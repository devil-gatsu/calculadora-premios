name: Gerar Executavel Windows

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar arquivos do repositório
      uses: actions/checkout@v4
    
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter
        
    - name: Compilar o .exe
      run: |
        pyinstaller --onefile --windowed calculadora.py
        
    - name: Disponibilizar o .exe para download
      uses: actions/upload-artifact@v4
      with:
        name: CalculadoraPremios-EXE
        path: dist/calculadora.exe
